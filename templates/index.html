<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask App - GitHub Actions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .status {
            background: #4caf50;
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            display: inline-block;
            margin: 20px 0;
            font-weight: bold;
        }
        
        p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
            margin: 20px 0;
        }
        
        .info-box {
            background: #f0f8ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            border-radius: 5px;
        }
        
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin: 5px;
        }
        
        footer {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Flask App</h1>
        <div class="status">✅ Application Running</div>
        
        <p>Welcome to your Flask application deployed with GitHub Actions and Docker!</p>
        
        <div class="info-box">
            <h3>📊 Application Info</h3>
            <p><strong>Framework:</strong> Flask 3.0.0</p>
            <p><strong>Port:</strong> 5000</p>
            <p><strong>Status:</strong> Healthy</p>
        </div>
        
        <div>
            <span class="badge">Docker</span>
            <span class="badge">GitHub Actions</span>
            <span class="badge">Flask</span>
        </div>
        
        <footer>
            <p>Built with ❤️ using Flask and Docker</p>
        </footer>
    </div>
</body>
</html>
