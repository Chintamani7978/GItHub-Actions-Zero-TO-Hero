name: Deploy Flask App

on:
    push:
        branches:
            - main
    
jobs:

    deploy:
        runs-on: self-hosted

        steps:
            - name: checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Kill any existing Flask container
              run: |
                docker stop flask-app || true
                docker rm flask-app || true
                docker stop github-actions-zero-to-hero-web-1 || true
                docker rm github-actions-zero-to-hero-web-1 || true
                docker system prune -f || true

            - name: Build Docker image locally
              run: |
                echo "Building Docker image..."
                docker build -t flask-app:latest .
                docker images | grep flask-app

            - name: Start Docker container
              run: |
                echo "Starting Flask container..."
                docker run -d \
                  -p 80:5000 \
                  --name flask-app \
                  --rm \
                  flask-app:latest

            - name: Wait for Flask app to be ready
              run: |
                echo "Waiting for Flask app to start..."
                for i in {1..30}; do
                  if curl -f http://localhost:80/health; then
                    echo "Flask app is running!"
                    break
                  fi
                  echo "Attempt $i: Flask app not ready yet, waiting..."
                  sleep 2
                done

            - name: Verify Flask app is serving requests
              run: |
                curl -v http://localhost:80/
                echo ""
                echo "Flask app is successfully deployed!"

            - name: Check container logs
              if: always()
              run: docker logs flask-app