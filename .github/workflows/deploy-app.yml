name: Deploy Flask App

on:
    workflow_run:
        workflows: ["Docker Build & Push"] # Name of the upstream workflow
        types: [completed]
        branches:
            - main
    
jobs:

    deploy:
        if: github.event.workflow_run.conclusion == 'success'

        runs-on: self-hosted

        steps:
            - name: checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Verify files
              run: |
                echo "Current directory:"
                pwd
                echo "Files:"
                ls -la
                echo "Dockerfile:"
                cat Dockerfile
                echo "docker-compose.yml:"
                cat docker-compose.yml

            - name: Stop existing containers
              run: docker compose down || true

            - name: Build Docker image locally
              run: |
                echo "Building Docker image..."
                docker build -t github-actions-app:latest .
                docker images | grep github-actions-app

            - name: Deploy with Docker Compose
              run: |
                echo "Deploying Flask app..."
                docker compose down || true
                docker compose up -d
                echo "Docker containers:"
                docker compose ps

            - name: Wait for Flask app to be ready
              run: |
                echo "Waiting for Flask app to start..."
                for i in {1..30}; do
                  if curl -f http://localhost:80/health; then
                    echo "Flask app is running!"
                    break
                  fi
                  echo "Attempt $i: Flask app not ready yet, waiting..."
                  sleep 2
                done

            - name: Verify Flask app is serving requests
              run: |
                curl -v http://localhost:80/
                echo ""
                echo "Flask app is successfully deployed!"

            - name: Check Docker container status
              run: docker compose ps